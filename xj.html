<h1 id="mainTitle">椎名真昼官网</h1>

<script>
// 时间更新
function updateBeijingTime() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
  const weekDay = weekDays[now.getDay()];
  const timeStr = `${year}-${month}-${day} ${hours}:${minutes}:${seconds} 星期${weekDay}`;
  document.getElementById('beijingTime').textContent = timeStr;
}
updateBeijingTime();
setInterval(updateBeijingTime, 1000);
// 音乐播放核心功能
const playlist = [
  {
    url: "https://cccimg.com/view.php/4a3d9de27ff2c4c60e2d2444dcf6513d.mp3",
    title: "红色高跟鞋",
    artist: "未知艺术家",
    artwork: "https://cccimg.com/view.php/10aa25188ab9ee48465f945395ee84c1.jpg"
  },
  {
    url: "https://cccimg.com/view.php/012b61e454251519df89cfea66437fd0.mp3",
    title: "蒲公英的约定",
    artist: "JAY",
    artwork: "https://cccimg.com/view.php/10aa25188ab9ee48465f945395ee84c1.jpg"
  },
  {
    url: "https://cccimg.com/view.php/580340fd3df2f2c3c75d02fed949ac2b.mp3",
    title: "花海",
    artist: "Jay",
    artwork: "https://cccimg.com/view.php/10aa25188ab9ee48465f945395ee84c1.jpg"
  },
  {
    url: "https://cccimg.com/view.php/d2733b2b075e4cb6e4aea1e155e8d6ca.flac",
    title: "恶作剧",
    artist: "未知艺术家",
    artwork: "https://cccimg.com/view.php/10aa25188ab9ee48465f945395ee84c1.jpg"
  }
];
let currentTrack = 0;
const audioPlayer = document.getElementById('audioPlayer');
const nextButton = document.getElementById('nextButton');
const audioAvatar = document.getElementById('audioAvatar');
let wasPlaying = false;
// 旋转控制核心变量
let rotationAngle = 0; // 当前旋转角度（0-360）
let rotationInterval = null; // 旋转定时器
const rotationSpeed = 0.5; // 每秒旋转角度（8秒一圈=360/8=45，这里0.5更慢，可调整）
// 开始旋转
function startRotation() {
  if (!rotationInterval) {
    rotationInterval = setInterval(() => {
      rotationAngle = (rotationAngle + rotationSpeed) % 360;
      audioAvatar.style.transform = `rotate(${rotationAngle}deg)`;
    }, 16); // 约60帧/秒，流畅旋转
  }
}
// 停止旋转（保留当前角度）
function stopRotation() {
  if (rotationInterval) {
    clearInterval(rotationInterval);
    rotationInterval = null;
  }
}
// 重置旋转（角度归0）
function resetRotation() {
  stopRotation();
  rotationAngle = 0;
  audioAvatar.style.transform = `rotate(0deg)`;
}
// 音频事件监听
audioPlayer.addEventListener('play', startRotation);
audioPlayer.addEventListener('pause', stopRotation);
audioPlayer.addEventListener('ended', () => {
  resetRotation();
  playNext(); // 自动下一首
});
// 切歌函数
function loadCurrentTrack() {
  const currentSong = playlist[currentTrack];
  audioPlayer.src = currentSong.url;
  audioAvatar.src = currentSong.artwork;
  resetRotation(); // 切歌重置旋转
  audioPlayer.load();
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: currentSong.title,
      artist: currentSong.artist,
      artwork: [{ src: currentSong.artwork, sizes: '512x512', type: 'image/jpeg' }]
    });
  }
}
function playNext() {
  currentTrack = (currentTrack + 1) % playlist.length;
  loadCurrentTrack();
  audioPlayer.play().catch(err => {
    console.log('切歌自动播放受限，需手动点击播放器播放', err);
  });
}
// 页面加载完成初始化
document.addEventListener('DOMContentLoaded', function() {
  nextButton.addEventListener('click', playNext);
  loadCurrentTrack();
});
// 页面隐藏/显示控制
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    wasPlaying = !audioPlayer.paused;
    audioPlayer.pause();
  } else {
    if (wasPlaying) {
      audioPlayer.play().catch(err => {});
    }
  }
});
// 按钮事件（保持不变）
document.getElementById('appJumpBtn').addEventListener('click', function() {
  const targetAppUrl = "tg://resolve?domain=QXJZPD";
  window.location.href = targetAppUrl;
  setTimeout(() => {
    if (document.hidden === false && window.location.href !== targetAppUrl) {
      alert("Ciallo~未检测到TG哦~😚跳转失败！\n宝宝检查是否已安装哦🥱");
    }
  }, 2000);
});
document.getElementById('zztg').addEventListener('click', function() {
  const targetAppUrl = "tg://resolve?domain=QXJNP";
  window.location.href = targetAppUrl;
  setTimeout(() => {
    if (document.hidden === false && window.location.href !== targetAppUrl) {
      alert("Ciallo~未检测到TG哦~😚跳转失败！\n宝宝检查是否已安装哦🥱");
    }
  }, 2000);
});
</script>
